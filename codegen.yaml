types:
  - {name: canvasRenderingContext2D}
  - {name: characterData,     parent: node}
  - {name: console}
  - {name: document,          parent: node}
  - {name: element,           parent: node}
  - {name: event}
  - {name: eventTarget}
  - {name: htmlCanvasElement, parent: htmlElement}
  - {name: htmlCollection}
  - {name: htmlElement,       parent: element}
  - {name: htmlInputElement,  parent: htmlElement}
  - {name: keyboardEvent,     parent: uiEvent}
  - {name: node,              parent: eventTarget}
  - {name: text,              parent: characterData}
  - {name: tokenList}
  - {name: uiEvent,           parent: event}
  - {name: window}

properties:
  canvasRenderingContext2D:
    direction: string
    fillStyle: string
    filter: string
    font: string
    fontKerning: string
    fontStretch: string
    fontVariantCaps: string
    globalAlpha: float64
    globalCompositeOperation: string
    imageSmoothingEnabled: bool
    imageSmoothingQuality: string
    lang: string
    letterSpacing: string
    lineCap: string
    lineDashOffset: float64
    lineJoin: string
    lineWidth: float64
    miterLimit: float64
    shadowBlur: float64
    shadowColor: string
    shadowOffsetX: float64
    shadowOffsetY: float64
    strokeStyle: string
    textAlign: string
    textBaseline: string
    textRendering: string
    wordSpacing: string

  htmlCanvasElement:
    width: int
    height: int

  element:
    id: string

  htmlInputElement:
    value: string

getters:
  htmlCollection:
    length: uint

  tokenList:
    length: uint
    values: string

  keyboardEvent:
    altKey: bool
    code: string
    ctrlKey: bool
    isComposing: bool
    key: string
    metaKey: bool
    repeat: bool
    shiftKey: bool

  event:
    bubbles: bool
    cancelable: bool
    composed: bool
    defaultPrevented: bool
    isTrusted: bool
    type: string

